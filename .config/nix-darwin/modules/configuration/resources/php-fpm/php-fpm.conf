[global]
pid = /var/run/php-fpm.pid
error_log = /var/log/php-fpm/error.log

[www]
user = phpfpm
group = nginx
listen = /var/run/php-fpm/php-fpm.socket
listen.owner = nginx
listen.group = nginx
listen.mode = 0660
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
env[PATH] = /run/current-system/sw/bin:/usr/bin:/bin
